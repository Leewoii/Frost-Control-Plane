services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: baryon
      POSTGRES_PASSWORD: baryon
      POSTGRES_DB: baryon
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U baryon -d baryon"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgres://baryon:baryon@postgres:5432/baryon
      OLLAMA_BASE_URL: http://host.docker.internal:11434/v1
    ports:
      - "4310:4310"
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgres://baryon:baryon@postgres:5432/baryon
      OLLAMA_BASE_URL: http://host.docker.internal:11434/v1
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      VITE_API_URL: http://localhost:4310
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  postgres-data:
